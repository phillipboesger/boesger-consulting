888;font-weight:400;font-size:0.92em;\">(Nov 2020 - May 2022)</span></h3><p>Helped organizations digitize complex processes, with a strong focus on the highly regulated medical sector (Risk Management &amp; Requirements Engineering).</p><ul style=\"margin-left:1.2em;\"><li><strong>Custom Implementations:</strong> Advised clients on optimal Polarion setups and developed individual extensions (Java, HTML, JS) to match their specific workflows.</li><li><strong>Internal Optimization:</strong> Initiated the continuous improvement of internal development structures, introducing better build management and CI/CD practices from day one.</li></ul></div></section>"
